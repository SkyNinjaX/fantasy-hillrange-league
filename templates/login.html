{% extends "base.html" %}
{% block content %}
<div class="min-h-screen flex items-center justify-center bg-gradient-to-br from-pitch to-grass py-12 px-4">
    <div class="max-w-md w-full bg-white rounded-2xl shadow-2xl p-8 border-t-4 border-gold">
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-16 h-16 bg-gold rounded-full mb-4">
                <i class="fas fa-trophy text-3xl text-pitch"></i>
            </div>
            <h2 class="text-3xl font-bold text-pitch">Fantasy Hillrange League</h2>
            <p class="text-gray-500 mt-2">Build your dream team</p>
        </div>

        <form method="POST" class="space-y-6">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
                <input type="email" name="email" placeholder="you@example.com" 
                       class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-pitch focus:outline-none" required>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                <input type="password" name="password" placeholder="••••••••" 
                       class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-pitch focus:outline-none" required>
            </div>
            <button type="submit" class="w-full bg-pitch text-white py-3 rounded-lg hover:bg-grass transition font-semibold">
                <i class="fas fa-sign-in-alt"></i> Login
            </button>
        </form>

        <p class="text-center mt-6 text-gray-600">
            Don't have an account? 
            <a href="{{ url_for('register') }}" class="text-pitch font-semibold hover:underline">Register</a>
        </p>
    </div>
</div>
{% endblock %}
